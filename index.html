<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Good Essen Thai</title>
<style>
body {
    font-family: Arial;
    background: #fff;
    margin: 0;
    padding: 0;
}

header {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    color: orange;
}

.section {
    padding: 20px;
}

.item {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
}

.price {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>Good Essen Thai</h1>
    <p>Sonnenwall 25, Duisburg</p>
</header>

<div class="section">
    <h2>🥢 Vorspeisen</h2>

    <div class="item">
        <span>Frühlingsrolle</span>
        <span class="price">2,50€</span>
    </div>

    <div class="item">
        <span>Krabbenchips</span>
        <span class="price">1,50€</span>
    </div>
</div>

<div class="section">
    <h2>🍜 Suppen</h2>

    <div class="item">
        <span>Tom Yam Goong</span>
        <span class="price">3,90€</span>
    </div>

    <div class="item">
        <span>Tom Kha Gai</span>
        <span class="price">2,90€</span>
    </div>
</div>

<div class="section">
    <h2>🍛 Hauptgerichte</h2>

    <div class="item">
        <span>Gebratener Reis mit Hähnchen</span>
        <span class="price">5,90€</span>
    </div>

    <div class="item">
        <span>Pad Thai mit Garnelen</span>
        <span class="price">6,90€</span>
    </div>
</div>

</body>
</html>
