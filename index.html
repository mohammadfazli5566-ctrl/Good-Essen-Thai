<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Essen Thai</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fafafa;
}

header {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    color: orange;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    margin-bottom: 15px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.title {
    font-weight: bold;
    font-size: 18px;
}

.desc {
    font-size: 14px;
    color: #555;
}

.price {
    color: red;
    font-weight: bold;
    margin-top: 5px;
}
</style>
</head>

<body>

<header>
    <h1>Good Essen Thai</h1>
    <p>Sonnenwall 25 • Duisburg</p>
</header>

<div class="container">

<!-- Gericht 1 -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-4319c7f7ef7d">
    <div class="card-content">
        <div class="title">Tom Yam Goong</div>
        <div class="desc">Scharfe Garnelensuppe mit Zitronengras, Champignons und Koriander.</div>
        <div class="price">3,90€</div>
    </div>
</div>

<!-- Gericht 2 -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
    <div class="card-content">
        <div class="title">Pad Thai Garnelen</div>
        <div class="desc">Gebratene Reisnudeln mit Garnelen, Ei, Erdnüssen und Sojasprossen.</div>
        <div class="price">6,90€</div>
    </div>
</div>

<!-- Gericht 3 -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1562967916-eb82221dfb36">
    <div class="card-content">
        <div class="title">Gebratener Reis mit Hähnchen</div>
        <div class="desc">Reis mit Hähnchen, Ei und frischem Gemüse.</div>
        <div class="price">5,90€</div>
    </div>
</div>

</div>

</body>
</html>
